services:
  postgres:
    image: postgres:18.3-alpine
    environment:
      POSTGRES_DB: application_demo
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d application_demo"]
      interval: 5s
      timeout: 5s
      retries: 10


volumes:
  postgres_data:

