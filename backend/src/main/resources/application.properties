server.port=8080
spring.application.name=mcmsm
spring.mvc.servlet.path=/api
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/application_demo}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:appuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:apppassword}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
app.storage.modpacks-root=${MODPACKS_ROOT:modpacks}
app.storage.temp-root=${TEMP_DIR:${java.io.tmpdir}/mcmsm}
spring.servlet.multipart.max-file-size=${MAX_UPLOAD_FILE_SIZE:8024MB}
spring.servlet.multipart.max-request-size=${MAX_UPLOAD_REQUEST_SIZE:8024MB}
server.tomcat.max-swallow-size=-1
app.runtime-sync.interval-ms=${RUNTIME_SYNC_INTERVAL_MS:15000}
logging.level.root=INFO
logging.level.dk.broegger_kruse.applicationdemo=INFO
logging.level.org.springframework.web=INFO
