server.port=8080
spring.application.name=mcmsm
app.storage.modpacks-root=${MODPACKS_ROOT:modpacks}
app.storage.temp-root=${TEMP_DIR:${java.io.tmpdir}/mcmsm}
app.storage.metadata-root=${DATA_ROOT:data}
spring.servlet.multipart.max-file-size=${MAX_UPLOAD_FILE_SIZE:15360MB}
spring.servlet.multipart.max-request-size=${MAX_UPLOAD_REQUEST_SIZE:15360MB}
server.tomcat.max-swallow-size=-1
app.runtime-sync.interval-ms=${RUNTIME_SYNC_INTERVAL_MS:15000}
app.update.github-repo=${UPDATE_GITHUB_REPO:kriskruse/McMSM}
app.update.check-interval-ms=${UPDATE_CHECK_INTERVAL_MS:1800000}
spring.threads.virtual.enabled=true
logging.level.root=INFO
logging.level.dk.broegger_kruse.mcmsm=INFO
logging.level.org.springframework.web=INFO
