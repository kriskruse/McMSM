# Test profile overrides
app.storage.modpacks-root=${java.io.tmpdir}/mcmsm-test-modpacks
app.storage.temp-root=${java.io.tmpdir}/mcmsm-test-temp
app.storage.metadata-root=${java.io.tmpdir}/mcmsm-test-data

# Keep runtime sync benign (ContainerService is @MockBean anyway)
app.runtime-sync.interval-ms=999999999

# Sensible upload limits for tests
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# Quiet logging during tests
logging.level.root=WARN
logging.level.dk.mcmsm=INFO
