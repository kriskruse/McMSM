name: Release McMSM

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Release type"
        required: true
        default: "prerelease"
        type: choice
        options:
          - prerelease
          - full
          - hotfix
      draft:
        description: "Create as draft release"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute release version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TYPE: ${{ inputs.release_type }}
        shell: bash
        run: |
          set -euo pipefail

          # Find the latest non-draft release tag
          LATEST_TAG=$(gh release list --limit 100 --json tagName,isDraft,publishedAt \
            --jq '[.[] | select(.isDraft == false)] | sort_by(.publishedAt) | last | .tagName // empty')

          if [[ -z "$LATEST_TAG" ]]; then
            case "$RELEASE_TYPE" in
              prerelease) NEW_VERSION="0.1" ;;
              full)       NEW_VERSION="1.0" ;;
              hotfix)
                echo "::error::No previous release to hotfix"
                exit 1
                ;;
            esac
          else
            LAST_VERSION="${LATEST_TAG#v}"

            # Split into MAJOR.MINOR[.PATCH]
            IFS='.' read -r MAJOR MINOR PATCH <<< "$LAST_VERSION"
            PATCH="${PATCH:-0}"

            if ! [[ "$MAJOR" =~ ^[0-9]+$ ]] || ! [[ "$MINOR" =~ ^[0-9]+$ ]] || ! [[ "$PATCH" =~ ^[0-9]+$ ]]; then
              echo "::error::Latest release tag '$LATEST_TAG' does not follow MAJOR.MINOR[.PATCH] format"
              exit 1
            fi

            case "$RELEASE_TYPE" in
              prerelease)
                MINOR=$((10#$MINOR + 1))
                NEW_VERSION="${MAJOR}.${MINOR}"
                ;;
              full)
                MAJOR=$((10#$MAJOR + 1))
                NEW_VERSION="${MAJOR}.0"
                ;;
              hotfix)
                PATCH=$((10#$PATCH + 1))
                NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
                ;;
            esac
          fi

          RELEASE_TAG="v${NEW_VERSION}"

          # Guard: never overwrite an existing release
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "::error::Release $RELEASE_TAG already exists. Refusing to overwrite."
            exit 1
          fi

          IS_PRERELEASE="false"
          if [[ "$RELEASE_TYPE" == "prerelease" ]]; then
            IS_PRERELEASE="true"
          fi

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "### Version: $NEW_VERSION (tag: $RELEASE_TAG, type: $RELEASE_TYPE)" >> "$GITHUB_STEP_SUMMARY"

      - name: Setup Java 25 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set pom.xml version
        shell: bash
        run: |
          set -euo pipefail
          mvn -B -f backend/pom.xml versions:set \
            -DnewVersion=${{ steps.version.outputs.version }} \
            -DgenerateBackupPoms=false

      - name: Build backend (includes frontend bundle)
        shell: bash
        run: |
          set -euo pipefail
          mvn -B -f backend/pom.xml clean package -DskipTests

      - name: Prepare release artifact
        id: artifact
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ steps.version.outputs.version }}"
          SOURCE_JAR="$(find backend/target -maxdepth 1 -type f -name '*.jar' ! -name '*-original*' | head -n 1)"

          if [[ -z "$SOURCE_JAR" ]]; then
            echo "::error::No JAR found in backend/target"
            exit 1
          fi

          RELEASE_JAR="McMSM-${VERSION}.jar"
          cp "$SOURCE_JAR" "$RELEASE_JAR"
          sha256sum "$RELEASE_JAR" > "${RELEASE_JAR}.sha256"

          echo "jar=$RELEASE_JAR" >> "$GITHUB_OUTPUT"
          echo "checksum=${RELEASE_JAR}.sha256" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        shell: bash
        run: |
          set -euo pipefail

          RELEASE_TAG="${{ steps.version.outputs.tag }}"
          NOTES_FILE="${RUNNER_TEMP}/release-notes.md"

          PREVIOUS_TAG="$(git tag --sort=-creatordate | head -n 1 || true)"

          if [[ -n "$PREVIOUS_TAG" ]]; then
            RANGE="${PREVIOUS_TAG}..HEAD"
            echo "## What's Changed" > "$NOTES_FILE"
          else
            RANGE="HEAD"
            echo "## Initial Release" > "$NOTES_FILE"
          fi
          echo "" >> "$NOTES_FILE"

          COMMIT_COUNT=0
          while IFS= read -r LINE; do
            [[ -z "$LINE" ]] && continue
            echo "$LINE" >> "$NOTES_FILE"
            COMMIT_COUNT=$((COMMIT_COUNT + 1))
          done < <(git log --reverse --pretty=format:'- [`%h`](https://github.com/${{ github.repository }}/commit/%H) %s (%an)' "$RANGE" --)

          if [[ "$COMMIT_COUNT" -eq 0 ]]; then
            echo "- No changes since last release." >> "$NOTES_FILE"
          fi

          echo "" >> "$NOTES_FILE"
          echo "---" >> "$NOTES_FILE"

          if [[ -n "$PREVIOUS_TAG" ]]; then
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG}...${RELEASE_TAG}" >> "$NOTES_FILE"
          fi

          echo "" >> "$NOTES_FILE"
          echo "### Checksums" >> "$NOTES_FILE"
          echo '```' >> "$NOTES_FILE"
          cat "${{ steps.artifact.outputs.checksum }}" >> "$NOTES_FILE"
          echo '```' >> "$NOTES_FILE"

          echo "path=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          RELEASE_TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"

          ARGS=(
            "$RELEASE_TAG"
            "${{ steps.artifact.outputs.jar }}"
            "${{ steps.artifact.outputs.checksum }}"
            --target "${{ github.sha }}"
            --title "McMSM $VERSION"
            --notes-file "${{ steps.notes.outputs.path }}"
            --latest
          )

          if [[ "${{ inputs.draft }}" == "true" ]]; then
            ARGS+=(--draft)
          fi

          if [[ "${{ steps.version.outputs.is_prerelease }}" == "true" ]]; then
            ARGS+=(--prerelease)
          fi

          gh release create "${ARGS[@]}"

      - name: Verify release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          RELEASE_TAG="${{ steps.version.outputs.tag }}"
          echo "### Release created successfully" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          gh release view "$RELEASE_TAG" --json tagName,name,isDraft,isPrerelease,assets \
            --jq '"Tag: \(.tagName)\nName: \(.name)\nDraft: \(.isDraft)\nPrerelease: \(.isPrerelease)\nAssets: \([.assets[].name] | join(", "))"' \
            >> "$GITHUB_STEP_SUMMARY"
